<!DOCTYPE html>
<html lang="en">
<head>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Random Joke</title>
	<script>
		async function getJoke() {
			const response = await fetch (
				"https://official-joke-api.appspot.com/random_joke"
			);

			const data = await response.json();

			document.getElementById("question").textContent = data.setup;
			document.getElementById("joke").textContent = data.punchline;
		}
		getJoke();
	</script>
</head>
<body style="background:#0D0D0D; color:#FFFAFA "">
	<div style="text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; height: 100vh;">
		<h1 id="question"></h1>
		<h3 id="joke"></h3>
	</div>
</body>
</html>
