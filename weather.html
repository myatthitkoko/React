<!DOCTYPE html>
<html lang="en">
<head>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Weather</title>
</head>
<body style="background:#0D0D0D; color:#FFFAFA "">
	<div style="text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; width: 100%; height: 100vh;">
		<h1>Weather System API</h1>
		<p id="message">Location access is required to get weather data at your position.</p>
		<div>
			<h2 id="city"></h2>
			<p style="font-size: 72pt;" id="temp"></p>
		</div>
	</div>
	<script>
		const x = document.getElementById("temp");
		const y = document.getElementById("city");
		const z = document.getElementById("message");
		
		function getLocation() {
		  if (navigator.geolocation) {
		    navigator.geolocation.getCurrentPosition(success, error);
		  } else { 
		    x.innerHTML = "Geolocation is not supported by this browser.";
		  }
		}
		
		async function success(position) {
		  z.innerHTML = "";
		  let latitude = position.coords.latitude;
		  let longitude = position.coords.longitude;
			
		  const cityURL = "https://nominatim.openstreetmap.org/reverse?lat=" + latitude + "&lon=" + longitude + "&format=json&zoom=10";
		  const reply = await fetch(cityURL);
		  const result = await reply.json();
		  console.log(result);
		  const place = result.address.city || result.address.town || result.address.village || result.address.county;
			
		  const url = "https://api.open-meteo.com/v1/forecast?latitude=" + position.coords.latitude + "&longitude=" + position.coords.longitude + "&hourly=precipitation_probability&current=temperature_2m,precipitation,rain,cloud_cover&wind_speed_unit=mph&temperature_unit=fahrenheit&precipitation_unit=inch";
		  const response = await fetch(url);
	
		  const data = await response.json();
	
		  console.log(data);

		  y.innerHTML = place + ", " + result.address.state;
		  x.innerHTML = data.current.temperature_2m + " " + data.current_units.temperature_2m;
		}
		
		function error() {
		  alert("Unable to locate your position.");
		}

		getLocation();

	</script>
</body>
</html>
