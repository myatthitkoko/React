<!DOCTYPE html>
<html lang="en">
	<head>
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<link rel="icon" type="image/png" href="https://uxwing.com/wp-content/themes/uxwing/download/weather/weather-icon.png">
		<title>Weather</title>
		<style>
			h1 {
				width: 100%;
				text-align: center;
			}
			p {
				font-size: 30pt;
				margin: 0 auto;
			}
			
			.content {
				margin: 0 auto;
				color: black;
			}
	
			.content div {
				border: white solid 1px;
				margin: 25px 25px;
				min-height: 230px;
				background-size: cover;
				border-radius: 30px;
				padding: 0px 20px;
				background-color: #edebe7;
			}
	
			.position img {
				position: absolute;
				width: 50px;
				margin: 0 10px;
			}
	
			.LA {
				background-image: url("https://images.unsplash.com/photo-1534253893894-10d024888e49?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D");
			}
	
			.SF {
				background-image: url('https://images.unsplash.com/photo-1719858403364-83f7442a197e?q=80&w=1170&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
			}
	
			.NY {
				background-image: url('https://images.unsplash.com/photo-1485738422979-f5c462d49f74?q=80&w=1199&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
			}
	
			.DC {
				background-image: url('https://images.unsplash.com/photo-1651707488176-a2b0aeced87d?q=80&w=1171&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D');
			}
	
			#locAccess {
				border-radius: 20px;
				height: 50px;
				background: green;
				color: white;
			}

			button {
				transition: all ease-in-out 0.25s
			}
	
			button:hover {
				cursor: pointer;
				transform: scale(0.9);
			}

			.search {
				display: flex;
				justify-content: center;
			}

			#searchBar {
				width: 80%;
				font-size: 16pt;
				border-radius: 30px;
				padding: 10px;
				background: rgba(255,255,255,0.5);
			}
	
			@media (min-width: 768px) {
				.content {
					max-width: 1400px;
					display: grid;
					grid-template-columns: repeat(3, 1fr);
					
				}

				.main {
					display: flex;
				}
				.position {
					width: 100%;
				}
			}
		</style>
	</head>
	<body style="background:#87CEEB;">
		<h1>Weather Data with API</h1>
		<div class="search">
			<input type="text" id="searchBar" placeholder="🔍 Look up a city">
		</div>
		<div class="main content">
			<div class="position">
				<h2 id="message">My Position</h2>
				<button id="locAccess" onClick="getLocation()">Grant Location Access</button>
				<img id="loading">
				<h2 id="city"></h2>
				<p id="tempHere"></p>
			</div>
		</div>
		<div id="extra" class="content">
			<div class="LA">
				<h2>Los Angeles, CA</h2>
				<p id="tempLA"></p>
			</div>
			<div class="SF">
				<h2>San Francisco, CA</h2>
				<p id="tempSF"></p>
			</div>
			<div class="NY">
				<h2>New York, NY</h2>
				<p id="tempNY"></p>
			</div>
			<div class="DC">
				<h2>Washington, D.C.</h2>
				<p id="tempDC"></p>
			</div>
		</div>
		<script>
			let cities = 0;
			let tempUnit = "fahrenheit";
			function getLocation() {
				document.getElementById("loading").src = "https://media.tenor.com/G7LfW0O5qb8AAAAi/loading-gif.gif";
				if (navigator.geolocation) {
					navigator.geolocation.getCurrentPosition(success, error);
				} else { 
					x.innerHTML = "Geolocation is not supported by this browser.";
				}
			}
			
			async function success(position) {
				document.getElementById("message").innerHTML = "";
				document.getElementById("locAccess").style.display = "none";
				document.getElementById("loading").style.display = "none";
				let latitude = position.coords.latitude;
				let longitude = position.coords.longitude;
					
				const cityURL = "https://nominatim.openstreetmap.org/reverse?lat=" + latitude + "&lon=" + longitude + "&format=json&zoom=10";
				const reply = await fetch(cityURL);
				const result = await reply.json();
				document.getElementById("city").innerHTML = result.address.town + ", " + result.address.state;
		
				getData(latitude, longitude, "tempHere")
			}
			
			function error() {
				alert("Unable to locate your position.");
			}

			async function getCityData(city, placeholder) {
				const url = "https://nominatim.openstreetmap.org/search?q=" + city + "&format=json&limit=1";
				const response = await fetch(url);
				const reply = await response.json();

				let latitude = reply[0].lat;
				let longitude = reply[0].lon;
				let index = "name" + cities;
				if (document.getElementById(index)) {
					document.getElementById(index).innerHTML = reply[0].display_name;
				}
				getData(latitude, longitude, placeholder);
			}

			async function getData(latitude, longitude, placeholder) {
				const url = "https://api.open-meteo.com/v1/forecast?latitude=" + latitude + "&longitude=" + longitude + "&hourly=precipitation_probability&current=temperature_2m,cloud_cover&wind_speed_unit=mph&temperature_unit=" + tempUnit + "&precipitation_unit=inch";
				const response = await fetch(url);
				const info = await response.json();
				
				document.getElementById(placeholder).innerHTML = info.current.temperature_2m + " " + info.current_units.temperature_2m;
			}

			document.getElementById("searchBar").addEventListener("keydown", function(event) {
				if (event.key === "Enter") {
					cities++;
					document.getElementById("extra").innerHTML = "<div><h2 id='name" + cities + "'></h2><p id='placeholder"+ cities +"'></p></div>" + document.getElementById("extra").innerHTML;
					getCityData(document.getElementById("searchBar").value, "placeholder" + cities);
					document.getElementById("searchBar").value = "";
				}
			});

			getCityData("New York", "tempNY");
			getCityData("Los Angeles", "tempLA");
			getCityData("San Francisco", "tempSF");
			getCityData("Washington DC", "tempDC");
	
		</script>
	</body>
</html>
